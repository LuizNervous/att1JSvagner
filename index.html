<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Minha Lista de Techs</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background-color: #f0f2f5;
        }

        .container {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }li{
            list-style: none;
        }

        input,
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        ul {
            padding-left: 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Minhas Tecnologias</h2>
        <input type="text" id="novoItem" placeholder="Ex: React, Java...">
        <button onclick="adicionarItem()">Adicionar à Lista</button>
        <ul id="listaNaTela"></ul>
    </div>

    <script>
        // 1. Array inicial (nossa lista)
        let minhasTecnologias = ["JavaScript", "HTML", "CSS"];
        const input=document.getElementById("novoItem")

        function carregarInterface() {
            let listaHtml = document.getElementById("listaNaTela");
            listaHtml.innerHTML = ""; // Limpa a tela para não duplicar

            for (let i = 0; i < minhasTecnologias.length; i++) {
                // DESAFIO 1: Adicione o item à lista
                listaHtml.innerHTML += "<li>" + minhasTecnologias[i] + "</li>";
            }
        }

        function adicionarItem() {
            
            let valor = document.getElementById("novoItem").value.trim();
                if (!valor) {
                               alert("Mande uma mensagem sem ser em branco ou vazio");  return
                                
                            }else {
                                 minhasTecnologias.push(valor);

            input.value = "";
                                
            carregarInterface();
                            }
            
        }
        input.addEventListener("keydown", function enviarEnter(event) {
            if (event.key==="Enter") {
                adicionarItem()
            }
        });

        carregarInterface();
    </script>
</body>

</html>
